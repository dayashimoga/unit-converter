<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Universal Unit Converter — 16 Categories | QuickUtils</title>
    <meta name="description" content="Convert between 200+ units across 16 categories: length, mass, temperature, time, digital storage, speed, area, volume, pressure, energy, force, frequency, angle, power, density, and number bases.">
    <link rel="canonical" href="https://units.quickutils.top/">
    <meta property="og:title" content="Universal Unit Converter | QuickUtils">
    <meta property="og:description" content="Convert between 200+ units across 16 categories including science, engineering, and math.">
    <meta property="og:url" content="https://units.quickutils.top/">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
    <link rel="stylesheet" href="quickutils-core.css">
    <link rel="stylesheet" href="style.css">
    <style>
        :root { --accent: #6366f1; --accent-glow: rgba(99,102,241,0.3); --bg-deep: #0a0e1a; --glass-bg: rgba(15,20,35,0.85); --text-primary: #e2e8f0; --text-muted: #94a3b8; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter','Segoe UI',sans-serif; background:var(--bg-deep); color:var(--text-primary); min-height:100vh; }
        .navbar { background:rgba(10,14,26,0.9); backdrop-filter:blur(12px); border-bottom:1px solid rgba(99,102,241,0.15); padding:0.75rem 0; position:sticky; top:0; z-index:100; }
        .container { max-width:1100px; margin:0 auto; padding:0 1rem; }
        .nav-inner { display:flex; justify-content:space-between; align-items:center; }
        .brand { text-decoration:none; color:var(--text-primary); font-weight:700; font-size:1.1rem; }
        .nav-links { display:flex; gap:0.75rem; align-items:center; }
        .theme-btn { background:none; border:none; font-size:1.2rem; cursor:pointer; }
        .hero { text-align:center; padding:2rem 0 1rem; }
        .hero h1 { font-size:2rem; background:linear-gradient(135deg,#6366f1,#a78bfa,#06b6d4); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:0.25rem; }
        .hero p { color:var(--text-muted); font-size:0.9rem; }
        
        /* Category Tabs */
        .cat-tabs { display:flex; flex-wrap:wrap; gap:6px; padding:1rem 0; justify-content:center; }
        .cat-tab { padding:6px 14px; border:1px solid rgba(99,102,241,0.15); border-radius:20px; background:transparent; color:var(--text-muted); cursor:pointer; font-size:0.8rem; transition:all 0.2s; white-space:nowrap; }
        .cat-tab:hover { border-color:var(--accent); color:var(--text-primary); }
        .cat-tab.active { background:var(--accent); color:#fff; border-color:var(--accent); box-shadow:0 0 12px var(--accent-glow); }
        
        /* Converter Card */
        .converter-card { background:var(--glass-bg); border:1px solid rgba(99,102,241,0.12); border-radius:16px; padding:1.5rem; backdrop-filter:blur(10px); }
        .converter-row { display:grid; grid-template-columns:1fr auto 1fr; gap:1rem; align-items:end; }
        @media(max-width:640px) { .converter-row { grid-template-columns:1fr; } }
        .converter-group label { display:block; font-size:0.75rem; color:var(--text-muted); margin-bottom:4px; text-transform:uppercase; letter-spacing:0.5px; }
        .converter-group input, .converter-group select { width:100%; padding:10px 12px; background:rgba(0,0,0,0.3); border:1px solid rgba(255,255,255,0.1); border-radius:10px; color:var(--text-primary); font-size:1rem; outline:none; transition:border-color 0.2s; }
        .converter-group input:focus, .converter-group select:focus { border-color:var(--accent); box-shadow:0 0 8px var(--accent-glow); }
        .converter-group select option { background:#1a1f2e; }
        .swap-btn { width:44px; height:44px; border-radius:50%; background:rgba(99,102,241,0.15); border:1px solid rgba(99,102,241,0.3); color:var(--accent); font-size:1.2rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.2s; align-self:center; }
        .swap-btn:hover { background:var(--accent); color:#fff; transform:rotate(180deg); }
        
        /* Result */
        .result-display { text-align:center; padding:1.5rem 0 0.5rem; }
        .result-value { font-size:2.5rem; font-weight:700; color:var(--accent); font-family:'Fira Code',monospace; word-break:break-all; }
        .result-formula { font-size:0.8rem; color:var(--text-muted); margin-top:0.25rem; font-family:monospace; }
        
        /* Quick Ref */
        .quick-ref { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:8px; margin-top:1rem; }
        .ref-card { background:rgba(99,102,241,0.06); border:1px solid rgba(99,102,241,0.1); border-radius:8px; padding:8px 12px; font-size:0.8rem; }
        .ref-from { color:var(--text-muted); font-size:0.7rem; }
        .ref-to { color:var(--text-primary); font-weight:600; }
        
        .footer { text-align:center; padding:2rem 0; font-size:0.75rem; color:var(--text-muted); border-top:1px solid rgba(255,255,255,0.05); margin-top:2rem; }
    </style>
</head>
<body>
    <nav class="navbar"><div class="container nav-inner">
        <a href="https://quickutils.top" class="brand">⚡ Unit Converter</a>
        <div class="nav-links">
            <a href="https://ko-fi.com/dayatin" target="_blank" style="color:var(--text-muted);text-decoration:none;font-size:0.85rem;">☕ Support</a>
            <button id="themeBtn" class="theme-btn">🌙</button>
        </div>
    </div></nav>

    <main class="container">
        <div class="hero">
            <h1>Universal Unit Converter</h1>
            <p>200+ units across 16 categories — Science · Engineering · Math</p>
        </div>

        <div id="categoryTabs" class="cat-tabs"></div>

        <div class="converter-card">
            <div class="converter-row">
                <div class="converter-group">
                    <label>From</label>
                    <input type="number" id="fromValue" value="1" step="any" autocomplete="off">
                    <select id="fromUnit" style="margin-top:6px;"></select>
                </div>
                <button id="swapUnitsBtn" class="swap-btn" title="Swap units">⇄</button>
                <div class="converter-group">
                    <label>To</label>
                    <div id="resultValue" class="result-value" style="min-height:44px;display:flex;align-items:center;justify-content:center;">—</div>
                    <select id="toUnit" style="margin-top:6px;"></select>
                </div>
            </div>
            <div class="result-display">
                <div id="formulaDisplay" class="result-formula"></div>
            </div>
        </div>

        <div id="quickRef" class="quick-ref"></div>
    </main>

    <footer class="footer">
        <div class="container">© 2026 QuickUtils. All rights reserved.</div>
    </footer>

    <script src="quickutils-core.js"></script>
    <script src="script.js"></script>
</body>
</html>
